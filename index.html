<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <title>Inventario de Jugadores</title>
    <link rel="stylesheet" href="site.css" />
</head>
<body>

    <h1>Inventario de Campaña</h1>

    <section id="jugador">
        <h2>Jugador</h2>
        <label>Nombre del jugador: <input type="text" id="nombreJugador"></label><br><br>
        <label>Personaje: <input type="text" id="nombrePersonaje"></label><br><br>

        <button type="button" id="btnGuardarInventario">💾 Guardar Inventario</button>
        <button type="button" id="btnCargarFalso" onclick="document.getElementById('inputCargarTxt').click()">📂 Cargar Inventario</button>
        <input type="file" id="inputCargarTxt" accept=".txt" style="display:none;">
    </section>

    <hr>

    <section id="objetos">
        <h2>Objetos (max. 5)</h2>
        
        <table id="tablaObjetos" border="1">
            <thead>
                <tr>
                    <th class="col-nombre">Nombre</th>
                    <th class="col-origen">Origen</th>
                    <th class="col-cat">Categorías</th>
                    <th class="col-rasgos">Rasgos</th>
                    <th class="col-accion">Eliminar</th>
                </tr>
            </thead>
            <tbody>
                <tr class="objeto">
                    <td><input type="text" class="obj-nombre" placeholder="Nombre..."></td>
                    <td><select class="obj-origen"><option value="">-- Seleccionar --</option></select></td>
                    <td class="obj-categorias">
                        <select class="obj-cat1"></select>
                        <select class="obj-cat2"></select>
                    </td>
                    <td class="obj-rasgos-container"></td>
                    <td class="obj-acciones" style="text-align: center;"></td>
                </tr>
            </tbody>
        </table>
        
        <br>
        <button type="button" id="btnAgregarObjeto">Agregar objeto</button>
        <p id="contadorObjetos">Objetos: 1 / 5</p>

        <section id="sinergias">
            <h2>Sinergias activas</h2>
            <div id="listaSinergias"><em>No hay sinergias activas</em></div>
        </section>
    </section>

    <section id="rasgos">
        <h2>Rasgos activos</h2>
        <div id="listaRasgos"><em>No hay rasgos activos</em></div>
    </section>

    <script type="module" src="./app.js"></script>
</body>
</html>
